<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Memory Match! 🧠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #FFF4E0; --bg-2: #FFE4F1; --primary: #FF6B6B;
      --secondary: #4ECDC4; --yellow: #FFD93D; --purple: #A78BFA;
      --green: #6BCB77; --orange: #FF9F45; --pink: #FF7AB6;
      --blue: #4D96FF; --ink: #2D2A4A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; overscroll-behavior: none; }
    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, var(--bg-2) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #E0F7FA 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #FFF9E6 0%, transparent 60%),
        var(--bg-1);
      min-height: 100vh; color: var(--ink); padding: 20px;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    body::before { top:-100px; right:-100px; width:300px; height:300px;
      background: radial-gradient(circle, rgba(255,217,61,0.3), transparent 70%);
      animation: float 20s ease-in-out infinite; }
    body::after { bottom:-80px; left:-80px; width:260px; height:260px;
      background: radial-gradient(circle, rgba(167,139,250,0.25), transparent 70%);
      animation: float 25s ease-in-out infinite reverse; }
    @keyframes float { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-20px); } }

    .home-btn {
      position: fixed; top: 18px; left: 18px; z-index: 50;
      width: 52px; height: 52px; border: none; background: white;
      color: var(--ink); border-radius: 16px; cursor: pointer;
      font-size: 1.6rem; display: flex; align-items: center;
      justify-content: center; text-decoration: none;
      box-shadow: 0 4px 0 #D5D2C7, 0 6px 14px rgba(45,42,74,0.15);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .home-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #D5D2C7, 0 3px 8px rgba(45,42,74,0.18); }

    .app { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }
    header { text-align: center; padding: 12px 0 24px; }
    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 800;
      line-height: 1; letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange));
      -webkit-background-clip: text; background-clip: text;
      color: transparent; margin-bottom: 8px;
      transform: rotate(-1deg); display: inline-block;
    }
    .tagline { font-size: 1.1rem; font-weight: 500; opacity: 0.7; }

    .controls {
      display: flex; gap: 16px; justify-content: center;
      margin-bottom: 24px; align-items: center;
    }
    .stats {
      background: white; padding: 10px 18px; border-radius: 18px;
      font-family: 'Baloo 2', sans-serif; font-weight: 700;
      box-shadow: 0 3px 0 rgba(0,0,0,0.08);
      font-size: 1.1rem;
    }
    .restart-btn {
      font-family: 'Baloo 2', sans-serif; font-weight: 700;
      padding: 10px 18px; border: none;
      background: linear-gradient(135deg, var(--primary), var(--orange));
      color: white; border-radius: 16px; cursor: pointer;
      font-size: 1rem;
      box-shadow: 0 5px 0 #C73E5C;
      display: flex; align-items: center; gap: 6px;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .restart-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #C73E5C; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card-wrap { perspective: 1200px; aspect-ratio: 0.85; cursor: pointer; }
    .card {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
    }
    .card.flipped, .card.matched { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 0 rgba(0,0,0,0.1), 0 10px 20px rgba(45,42,74,0.15);
      overflow: hidden;
      border: 4px solid white;
    }
    .card-front {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      font-size: clamp(2rem, 8vw, 3.5rem);
    }
    .card-back {
      transform: rotateY(180deg);
      background: white;
      font-size: clamp(2.5rem, 10vw, 4rem);
    }

    .card.matched .card-face {
      box-shadow: 0 4px 0 rgba(107,203,119,0.4), 0 10px 24px rgba(107,203,119,0.4);
      animation: matched-pop 0.6s ease;
    }
    @keyframes matched-pop {
      0%, 100% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }

    .card-wrap { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
    @keyframes pop-in {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .reward-banner {
      position: fixed; top: 88px; left: 50%;
      transform: translateX(-50%) translateY(-30px) scale(0.85);
      opacity: 0; z-index: 60; pointer-events: none;
      background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 50%, #FF6B6B 100%);
      color: white; font-family: 'Baloo 2', sans-serif;
      padding: 18px 28px; border-radius: 24px;
      box-shadow: 0 8px 0 rgba(199,62,92,0.3), 0 16px 40px rgba(255,107,107,0.5);
      text-align: center; max-width: calc(100% - 32px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      transition: opacity 0.3s ease;
    }
    .reward-banner.visible { opacity: 1; animation: reward-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes reward-bounce {
      0% { transform: translateX(-50%) translateY(-80px) scale(0.5); }
      60% { transform: translateX(-50%) translateY(8px) scale(1.08); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }
    .reward-main { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 800; line-height: 1.1; }
    .reward-sub { font-size: clamp(0.9rem, 2.5vw, 1.05rem); font-weight: 600; margin-top: 6px; opacity: 0.95; }

    .restart-btn.celebrate { animation: celebrate-pulse 0.8s ease-in-out infinite; }
    @keyframes celebrate-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 5px 0 #C73E5C; }
      50% { transform: scale(1.1) rotate(-3deg); box-shadow: 0 7px 0 #C73E5C, 0 12px 24px rgba(255,217,61,0.7); }
    }

    .confetti { position: fixed; top: -40px; pointer-events: none; z-index: 70; animation: confetti-fall 3s linear forwards; }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .footer-note { text-align: center; margin-top: 32px; font-size: 0.9rem; opacity: 0.5; font-weight: 500; }

    @media (max-width: 600px) {
      .home-btn { top: 12px; left: 12px; width: 46px; height: 46px; font-size: 1.4rem; }
      .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .reward-banner { top: 70px; padding: 14px 20px; }
    }
  </style>
</head>
<body>
  <a href="./" class="home-btn" aria-label="Home" title="Home">🏠</a>
  <div class="app">
    <header>
      <h1>Memory Match!</h1>
      <p class="tagline">Find the matching pairs 🎴</p>
    </header>

    <div class="controls">
      <div class="stats" id="stats">Pairs: 0 / 6</div>
      <button class="restart-btn" id="restartBtn">🎲 New Game</button>
    </div>

    <div class="grid" id="grid"></div>

    <div class="reward-banner" id="rewardBanner" aria-hidden="true">
      <div class="reward-main">🎉 You found them all! 🎉</div>
      <div class="reward-sub">Tap 🎲 New Game to play again!</div>
    </div>
    <p class="footer-note">Made with 💛 for little learners</p>
  </div>

  <script>
    const allEmojis = ['🐶','🐱','🐮','🐷','🐔','🦆','🦁','🐸','🐝','🦊','🐰','🐻'];
    const PAIR_COUNT = 6;
    let cards = [];
    let flipped = [];
    let matched = 0;
    let lock = false;
    let rewardShown = false;

    let preferredVoice = null;
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      const en = voices.filter(v => v.lang.startsWith('en'));
      preferredVoice = en.find(v => /samantha|karen|tessa|fiona|moira|female/i.test(v.name))
        || en.find(v => /google.*us english/i.test(v.name)) || en[0] || voices[0];
    }
    if ('speechSynthesis' in window) { loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
    function speak(text, opts = {}) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = opts.rate || 0.95; u.pitch = opts.pitch || 1.2; u.volume = 1;
      if (preferredVoice) u.voice = preferredVoice;
      setTimeout(() => speechSynthesis.speak(u), 50);
    }

    const grid = document.getElementById('grid');
    const stats = document.getElementById('stats');
    const restartBtn = document.getElementById('restartBtn');
    const rewardBanner = document.getElementById('rewardBanner');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function newGame() {
      const picked = shuffle(allEmojis).slice(0, PAIR_COUNT);
      cards = shuffle([...picked, ...picked]).map((emoji, i) => ({ id: i, emoji, matched: false }));
      flipped = [];
      matched = 0;
      lock = false;
      rewardShown = false;
      hideReward();
      render();
    }

    function render() {
      grid.innerHTML = '';
      cards.forEach((c, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.style.animationDelay = (i * 40) + 'ms';

        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = i;
        if (c.matched) card.classList.add('matched');

        const front = document.createElement('div');
        front.className = 'card-face card-front';
        front.textContent = '?';

        const back = document.createElement('div');
        back.className = 'card-face card-back';
        back.textContent = c.emoji;

        card.appendChild(front);
        card.appendChild(back);
        wrap.appendChild(card);
        wrap.addEventListener('click', () => flipCard(i, card));
        grid.appendChild(wrap);
      });
      updateStats();
    }

    function flipCard(idx, cardEl) {
      if (lock) return;
      if (cards[idx].matched) return;
      if (flipped.find(f => f.idx === idx)) return;

      cardEl.classList.add('flipped');
      flipped.push({ idx, cardEl });
      speak(cards[idx].emoji ? '' : ''); // no audio per flip - too noisy

      if (flipped.length === 2) {
        lock = true;
        const [a, b] = flipped;
        if (cards[a.idx].emoji === cards[b.idx].emoji) {
          // Match!
          setTimeout(() => {
            cards[a.idx].matched = true;
            cards[b.idx].matched = true;
            a.cardEl.classList.add('matched');
            b.cardEl.classList.add('matched');
            matched++;
            updateStats();
            speak('Match!', { pitch: 1.4, rate: 1.0 });
            flipped = [];
            lock = false;

            if (matched === PAIR_COUNT && !rewardShown) {
              rewardShown = true;
              setTimeout(showReward, 600);
            }
          }, 400);
        } else {
          // No match - flip back after delay
          setTimeout(() => {
            a.cardEl.classList.remove('flipped');
            b.cardEl.classList.remove('flipped');
            flipped = [];
            lock = false;
          }, 1200);
        }
      }
    }

    function updateStats() {
      stats.textContent = `Pairs: ${matched} / ${PAIR_COUNT}`;
    }

    function showReward() {
      rewardBanner.classList.add('visible');
      rewardBanner.setAttribute('aria-hidden', 'false');
      restartBtn.classList.add('celebrate');
      fireConfetti();
      setTimeout(() => {
        const phrases = ['Amazing memory!', 'You did it!', 'Wonderful!', 'Way to go!'];
        speak(phrases[Math.floor(Math.random()*phrases.length)], { pitch: 1.3, rate: 0.95 });
      }, 800);
    }

    function hideReward() {
      rewardBanner.classList.remove('visible');
      rewardBanner.setAttribute('aria-hidden', 'true');
      restartBtn.classList.remove('celebrate');
    }

    function fireConfetti() {
      const emojis = ['🎉','🌟','✨','⭐','🎊','💫','🎈'];
      for (let i = 0; i < 28; i++) {
        setTimeout(() => {
          const c = document.createElement('span');
          c.className = 'confetti';
          c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
          c.style.left = (Math.random()*100) + 'vw';
          c.style.fontSize = (1.4 + Math.random()*1.2) + 'rem';
          c.style.animationDuration = (2 + Math.random()*2) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 5000);
        }, i*70);
      }
    }

    restartBtn.addEventListener('click', newGame);
    newGame();

    document.addEventListener('contextmenu', e => e.preventDefault());
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap <= 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (/^[a-z]+:\/\//i.test(href) || href.startsWith('//') || href.startsWith('mailto:') || href.startsWith('tel:')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
