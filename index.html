<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game Time! 🎈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #FFF4E0;
      --bg-2: #FFE4F1;
      --primary: #FF6B6B;
      --secondary: #4ECDC4;
      --yellow: #FFD93D;
      --purple: #A78BFA;
      --green: #6BCB77;
      --orange: #FF9F45;
      --pink: #FF7AB6;
      --blue: #4D96FF;
      --ink: #2D2A4A;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, var(--bg-2) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #E0F7FA 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #FFF9E6 0%, transparent 60%),
        var(--bg-1);
      min-height: 100vh;
      color: var(--ink);
      padding: 24px 20px 40px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Floating decorative shapes */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      top: -100px; right: -100px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255, 217, 61, 0.3), transparent 70%);
      animation: float 20s ease-in-out infinite;
    }
    body::after {
      bottom: -80px; left: -80px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.25), transparent 70%);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -20px); }
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      padding: 24px 0 36px;
    }

    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--primary), var(--orange), var(--purple), var(--blue));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
      transform: rotate(-1deg);
      display: inline-block;
      animation: shimmer 6s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .tagline {
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      font-weight: 600;
      color: var(--ink);
      opacity: 0.7;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .game-card {
      position: relative;
      padding: 36px 28px;
      text-align: center;
      border-radius: 32px;
      text-decoration: none;
      color: var(--ink);
      display: block;
      cursor: pointer;
      box-shadow:
        0 6px 0 rgba(0,0,0,0.08),
        0 14px 28px rgba(45, 42, 74, 0.12);
      border: 4px solid white;
      background: white;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      animation: card-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes card-pop {
      0% { transform: scale(0) rotate(-6deg); opacity: 0; }
      100% { transform: scale(1) rotate(var(--tilt, 0deg)); opacity: 1; }
    }

    .game-card:nth-child(odd) { --tilt: -1deg; }
    .game-card:nth-child(even) { --tilt: 1deg; }

    .game-card.available:active {
      transform: scale(0.96) rotate(var(--tilt, 0deg));
      box-shadow:
        0 2px 0 rgba(0,0,0,0.08),
        0 4px 8px rgba(45, 42, 74, 0.1);
    }

    @media (hover: hover) and (pointer: fine) {
      .game-card.available:hover {
        transform: scale(1.03) rotate(var(--tilt, 0deg));
        box-shadow:
          0 8px 0 rgba(0,0,0,0.08),
          0 18px 32px rgba(45, 42, 74, 0.18);
      }
    }

    /* Color variants - background gradients & border accents */
    .game-card[data-color="pink"]    { background: linear-gradient(160deg, #FFE5E8, #FFF8F8); border-color: #FFCDD2; }
    .game-card[data-color="blue"]    { background: linear-gradient(160deg, #DCEBFF, #F8FAFF); border-color: #BBD4FF; }
    .game-card[data-color="green"]   { background: linear-gradient(160deg, #DEF5E2, #F8FFF9); border-color: #B8E6BF; }
    .game-card[data-color="yellow"]  { background: linear-gradient(160deg, #FFF6D6, #FFFEF8); border-color: #FFE89A; }
    .game-card[data-color="purple"]  { background: linear-gradient(160deg, #EDE7FE, #FAF8FF); border-color: #D4C7FB; }
    .game-card[data-color="orange"]  { background: linear-gradient(160deg, #FFEFD9, #FFFAF2); border-color: #FFD9A8; }
    .game-card[data-color="rainbow"] { background: linear-gradient(135deg, #FFE5E8, #FFEFD9, #FFF6D6, #DEF5E2, #DCEBFF, #EDE7FE); border-color: white; }

    .card-emoji {
      font-size: clamp(4rem, 10vw, 5.5rem);
      line-height: 1;
      display: block;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .game-card h2 {
      font-family: 'Baloo 2', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }

    .game-card p {
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.7;
      line-height: 1.4;
    }

    .badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--ink);
      color: white;
      font-family: 'Baloo 2', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transform: rotate(8deg);
    }

    .badge.new {
      background: var(--primary);
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-3deg) scale(1.05); }
    }

    .game-card.soon {
      filter: grayscale(0.5);
      opacity: 0.55;
      cursor: default;
    }

    .game-card.soon:active {
      transform: scale(1) rotate(var(--tilt, 0deg)) !important;
    }

    .footer-note {
      text-align: center;
      margin-top: 40px;
      font-size: 0.9rem;
      color: var(--ink);
      opacity: 0.5;
      font-weight: 500;
    }

    @media (max-width: 600px) {
      body { padding: 16px 14px 32px; }
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
      .game-card {
        padding: 24px 16px;
        border-radius: 24px;
      }
      .card-emoji { margin-bottom: 10px; }
      .game-card h2 { font-size: 1.3rem; }
      .game-card p { font-size: 0.85rem; }
      .badge { font-size: 0.6rem; padding: 3px 8px; top: 10px; right: 10px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Game Time!</h1>
      <p class="tagline">for Graelyn &amp; Beckett 🎈</p>
    </header>

    <div class="games-grid" id="grid"></div>

    <p class="footer-note">Made with 💛 by Dad</p>
  </div>

  <script>
    // ============ Games list ============
    // Add new games here — they'll appear automatically. Set available: true once the file exists.
    const games = [
      {
        title: 'Word Play',
        emoji: '🔤',
        description: 'Learn 3 & 4 letter words',
        href: 'word-play.html',
        color: 'pink',
        available: true
      },
      {
        title: 'Number Fun',
        emoji: '🔢',
        description: 'Count from 1 to 10',
        href: 'number-fun.html',
        color: 'blue',
        available: true
      },
      {
        title: 'Color Match',
        emoji: '🌈',
        description: 'Learn your colors',
        href: 'color-match.html',
        color: 'rainbow',
        available: true
      },
      {
        title: 'Animal Sounds',
        emoji: '🐾',
        description: 'Hear what animals say',
        href: 'animal-sounds.html',
        color: 'green',
        available: true
      },
      {
        title: 'Shape Hunt',
        emoji: '🔷',
        description: 'Find circles & squares',
        href: 'shape-hunt.html',
        color: 'yellow',
        available: true
      },
      {
        title: 'Memory Match',
        emoji: '🧠',
        description: 'Find the pairs',
        href: 'memory-match.html',
        color: 'purple',
        available: true
      },
      {
        title: 'Math Fun',
        emoji: '➕',
        description: 'Add and subtract with animals',
        href: 'math-fun.html',
        color: 'orange',
        available: true,
        isNew: true
      }
    ];

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = games.map((g, i) => {
        const tag = g.available ? 'a' : 'div';
        const hrefAttr = g.available ? `href="${g.href}"` : '';
        const stateClass = g.available ? 'available' : 'soon';
        let badge = '';
        if (!g.available) {
          badge = '<span class="badge">Soon</span>';
        } else if (g.isNew) {
          badge = '<span class="badge new">New!</span>';
        }
        return `
          <${tag} ${hrefAttr} class="game-card ${stateClass}" data-color="${g.color}" style="animation-delay: ${i * 80}ms">
            <span class="card-emoji">${g.emoji}</span>
            <h2>${g.title}</h2>
            <p>${g.description}</p>
            ${badge}
          </${tag}>
        `;
      }).join('');
    }
    render();

    // ============ Kid-safe ecosystem ============
    // Block right-click and iOS long-press menus (prevents "open in new tab", image save, etc.)
    document.addEventListener('contextmenu', e => e.preventDefault());

    // Block double-tap zoom which can disorient toddlers
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap <= 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // Belt-and-suspenders: refuse to navigate to anything off-domain.
    // Allows relative paths (game.html, ./foo, /games/foo) and same-origin only.
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (
        /^[a-z]+:\/\//i.test(href) ||
        href.startsWith('//') ||
        href.startsWith('mailto:') ||
        href.startsWith('tel:')
      ) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
