<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shape Hunt! 🔷</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #FFF4E0; --bg-2: #FFE4F1; --primary: #FF6B6B;
      --secondary: #4ECDC4; --yellow: #FFD93D; --purple: #A78BFA;
      --green: #6BCB77; --orange: #FF9F45; --pink: #FF7AB6;
      --blue: #4D96FF; --ink: #2D2A4A;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; overscroll-behavior: none; }
    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, var(--bg-2) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, #E0F7FA 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, #FFF9E6 0%, transparent 60%),
        var(--bg-1);
      min-height: 100vh; color: var(--ink); padding: 20px;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent;
    }
    body::before, body::after { content: ''; position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    body::before { top:-100px; right:-100px; width:300px; height:300px;
      background: radial-gradient(circle, rgba(255,217,61,0.3), transparent 70%);
      animation: float 20s ease-in-out infinite; }
    body::after { bottom:-80px; left:-80px; width:260px; height:260px;
      background: radial-gradient(circle, rgba(167,139,250,0.25), transparent 70%);
      animation: float 25s ease-in-out infinite reverse; }
    @keyframes float { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-20px); } }

    .home-btn {
      position: fixed; top: 18px; left: 18px; z-index: 50;
      width: 52px; height: 52px; border: none; background: white;
      color: var(--ink); border-radius: 16px; cursor: pointer;
      font-size: 1.6rem; display: flex; align-items: center;
      justify-content: center; text-decoration: none;
      box-shadow: 0 4px 0 #D5D2C7, 0 6px 14px rgba(45,42,74,0.15);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .home-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #D5D2C7, 0 3px 8px rgba(45,42,74,0.18); }

    .app { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    header { text-align: center; padding: 12px 0 24px; }
    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem); font-weight: 800;
      line-height: 1; letter-spacing: -0.02em;
      background: linear-gradient(90deg, var(--primary), var(--purple), var(--blue));
      -webkit-background-clip: text; background-clip: text;
      color: transparent; margin-bottom: 8px;
      transform: rotate(-1deg); display: inline-block;
    }
    .tagline { font-size: 1.1rem; font-weight: 500; opacity: 0.7; }

    .shapes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 18px; padding: 8px;
    }

    .shape-card {
      aspect-ratio: 1; border-radius: 28px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px;
      background: white; border: 4px solid white;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08), 0 12px 24px rgba(45,42,74,0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
      position: relative; overflow: hidden;
      padding: 16px;
    }
    @keyframes pop-in {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }
    .shape-card:active { transform: scale(0.95); }
    .shape-card.spinning .shape-svg { animation: spin 0.7s ease-out; }
    @keyframes spin {
      0% { transform: rotate(0) scale(1); }
      50% { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .shape-svg {
      width: 60%; height: 60%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      transition: transform 0.3s ease;
    }
    .shape-name {
      font-family: 'Baloo 2', sans-serif; font-weight: 800;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--ink); letter-spacing: 0.02em;
    }

    .sparkle { position: absolute; pointer-events: none; animation: sparkle-fly 0.8s ease-out forwards; font-size: 1.6rem; z-index: 10; }
    @keyframes sparkle-fly {
      0% { transform: scale(0) rotate(0); opacity: 1; }
      50% { transform: scale(1.4) rotate(180deg); opacity: 1; }
      100% { transform: scale(0.5) rotate(360deg) translateY(-40px); opacity: 0; }
    }

    .reward-banner {
      position: fixed; top: 88px; left: 50%;
      transform: translateX(-50%) translateY(-30px) scale(0.85);
      opacity: 0; z-index: 60; pointer-events: none;
      background: linear-gradient(135deg, #FFD93D 0%, #FF9F45 50%, #FF6B6B 100%);
      color: white; font-family: 'Baloo 2', sans-serif;
      padding: 18px 28px; border-radius: 24px;
      box-shadow: 0 8px 0 rgba(199,62,92,0.3), 0 16px 40px rgba(255,107,107,0.5);
      text-align: center; max-width: calc(100% - 32px);
      text-shadow: 0 2px 4px rgba(0,0,0,0.15);
      transition: opacity 0.3s ease;
    }
    .reward-banner.visible { opacity: 1; animation: reward-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    @keyframes reward-bounce {
      0% { transform: translateX(-50%) translateY(-80px) scale(0.5); }
      60% { transform: translateX(-50%) translateY(8px) scale(1.08); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }
    .reward-main { font-size: clamp(1.3rem, 4vw, 1.8rem); font-weight: 800; line-height: 1.1; }
    .reward-sub { font-size: clamp(0.9rem, 2.5vw, 1.05rem); font-weight: 600; margin-top: 6px; opacity: 0.95; }

    .confetti { position: fixed; top: -40px; pointer-events: none; z-index: 70; animation: confetti-fall 3s linear forwards; }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .footer-note { text-align: center; margin-top: 32px; font-size: 0.9rem; opacity: 0.5; font-weight: 500; }

    @media (max-width: 600px) {
      .home-btn { top: 12px; left: 12px; width: 46px; height: 46px; font-size: 1.4rem; }
      .shapes-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .reward-banner { top: 70px; padding: 14px 20px; }
    }
  </style>
</head>
<body>
  <a href="./" class="home-btn" aria-label="Home" title="Home">🏠</a>
  <div class="app">
    <header>
      <h1>Shape Hunt!</h1>
      <p class="tagline">Tap a shape to hear its name 🔷</p>
    </header>
    <div class="shapes-grid" id="grid"></div>
    <div class="reward-banner" id="rewardBanner" aria-hidden="true">
      <div class="reward-main">🔷 You found all the shapes! 🔷</div>
      <div class="reward-sub">Tap any shape to keep playing!</div>
    </div>
    <p class="footer-note">Made with 💛 for little learners</p>
  </div>

  <script>
    const shapes = [
      { name: 'Circle',    color: '#E63946', svg: '<circle cx="50" cy="50" r="42" />' },
      { name: 'Square',    color: '#4D96FF', svg: '<rect x="10" y="10" width="80" height="80" rx="6" />' },
      { name: 'Triangle',  color: '#FFD93D', svg: '<polygon points="50,10 92,86 8,86" />' },
      { name: 'Rectangle', color: '#6BCB77', svg: '<rect x="6" y="22" width="88" height="56" rx="6" />' },
      { name: 'Star',      color: '#FF9F45', svg: '<polygon points="50,8 61,38 93,38 67,57 77,88 50,69 23,88 33,57 7,38 39,38" />' },
      { name: 'Heart',     color: '#FF7AB6', svg: '<path d="M50 88 C 18 65, 8 42, 24 24 C 36 12, 50 22, 50 32 C 50 22, 64 12, 76 24 C 92 42, 82 65, 50 88 Z" />' },
      { name: 'Oval',      color: '#A78BFA', svg: '<ellipse cx="50" cy="50" rx="42" ry="30" />' },
      { name: 'Diamond',   color: '#4ECDC4', svg: '<polygon points="50,8 92,50 50,92 8,50" />' },
      { name: 'Pentagon',  color: '#FF6B6B', svg: '<polygon points="50,8 92,38 76,86 24,86 8,38" />' },
      { name: 'Hexagon',   color: '#8B5E3C', svg: '<polygon points="50,8 88,30 88,70 50,92 12,70 12,30" />' },
      { name: 'Crescent',  color: '#FFD93D', svg: '<path d="M70 50 C 70 75, 50 90, 30 85 C 50 80, 60 65, 60 50 C 60 35, 50 20, 30 15 C 50 10, 70 25, 70 50 Z" />' },
      { name: 'Cross',     color: '#9CA3AF', svg: '<polygon points="38,8 62,8 62,38 92,38 92,62 62,62 62,92 38,92 38,62 8,62 8,38 38,38" />' }
    ];

    let preferredVoice = null;
    function loadVoices() {
      const voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      const en = voices.filter(v => v.lang.startsWith('en'));
      preferredVoice = en.find(v => /samantha|karen|tessa|fiona|moira|female/i.test(v.name))
        || en.find(v => /google.*us english/i.test(v.name)) || en[0] || voices[0];
    }
    if ('speechSynthesis' in window) { loadVoices(); speechSynthesis.onvoiceschanged = loadVoices; }
    function speak(text, opts = {}) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = opts.rate || 0.9; u.pitch = opts.pitch || 1.15; u.volume = 1;
      if (preferredVoice) u.voice = preferredVoice;
      setTimeout(() => speechSynthesis.speak(u), 50);
    }

    const grid = document.getElementById('grid');
    const rewardBanner = document.getElementById('rewardBanner');
    const tapped = new Set();
    let rewardShown = false;

    function render() {
      grid.innerHTML = '';
      shapes.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'shape-card';
        card.style.animationDelay = (i * 50) + 'ms';
        card.innerHTML = `
          <svg class="shape-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="${s.color}">
            ${s.svg}
          </svg>
          <span class="shape-name">${s.name}</span>
        `;
        card.addEventListener('click', (e) => handleTap(e, card, s, i));
        grid.appendChild(card);
      });
    }

    function handleTap(e, card, shape, idx) {
      card.classList.remove('spinning');
      void card.offsetWidth;
      card.classList.add('spinning');
      sparkle(card, e);
      speak(shape.name);

      tapped.add(idx);
      if (!rewardShown && tapped.size === shapes.length) {
        rewardShown = true;
        showReward();
      }
    }

    function sparkle(card, e) {
      const emojis = ['✨', '⭐', '💫', '🌟'];
      const rect = card.getBoundingClientRect();
      const x = (e.clientX || rect.left + rect.width/2) - rect.left;
      const y = (e.clientY || rect.top + rect.height/2) - rect.top;
      for (let i = 0; i < 3; i++) {
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        s.style.left = (x + (Math.random()-0.5)*60) + 'px';
        s.style.top = (y + (Math.random()-0.5)*60) + 'px';
        s.style.animationDelay = (i*60) + 'ms';
        card.appendChild(s);
        setTimeout(() => s.remove(), 1000);
      }
    }

    function showReward() {
      rewardBanner.classList.add('visible');
      rewardBanner.setAttribute('aria-hidden', 'false');
      fireConfetti();
      setTimeout(() => speak('You found all the shapes!', { pitch: 1.3, rate: 0.95 }), 1000);
    }

    function fireConfetti() {
      const emojis = ['🎉','🌟','✨','⭐','🎊','💫','🎈','🔷'];
      for (let i = 0; i < 28; i++) {
        setTimeout(() => {
          const c = document.createElement('span');
          c.className = 'confetti';
          c.textContent = emojis[Math.floor(Math.random()*emojis.length)];
          c.style.left = (Math.random()*100) + 'vw';
          c.style.fontSize = (1.4 + Math.random()*1.2) + 'rem';
          c.style.animationDuration = (2 + Math.random()*2) + 's';
          document.body.appendChild(c);
          setTimeout(() => c.remove(), 5000);
        }, i*70);
      }
    }

    render();

    document.addEventListener('contextmenu', e => e.preventDefault());
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap <= 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });
    document.addEventListener('click', e => {
      const link = e.target.closest('a[href]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (/^[a-z]+:\/\//i.test(href) || href.startsWith('//') || href.startsWith('mailto:') || href.startsWith('tel:')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
